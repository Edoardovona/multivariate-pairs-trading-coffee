# Configuration for the original Bloomberg dataset (proprietary, git-ignored).
#
# This reproduces the study reported in reports/Multivariate_Pair_Trading.pdf.
# Place the Bloomberg export at data/raw/CoffeeData.xlsx (date column followed
# by <TICKER>_LAST close-price columns) and run:
#
#     python scripts/run_backtest.py --config configs/bloomberg.yaml

data:
  path: data/raw/CoffeeData.xlsx
  start: "2016-02-12"
  end: "2026-02-12"

universe:
  anchor: KC1                     # Arabica front-month future
  sector_proxy: XLP               # consumer staples sector control
  equities: [SJM, KO, MDLZ, JVA]  # basket selected via in-sample screening
  # Excluded from screening: Robusta, sector proxies and late-listed equities
  exclude: [DF1, COFF, DBA, MOO, XLP, PBJ, DBC,
            WEST, BROS, BRCC, JDEP, LKNCY, REBN, THCH]

walk_forward:
  min_train_years: 4            # first (expanding) train window
  test_months: 12               # length of each out-of-sample fold
  embargo_days: 21              # gap between train end and test start

signals:
  zscore_window: 22             # ~1 trading month

strategy:
  risk_aversion: 1.0            # lambda in the bi-objective optimization
  transaction_cost: 0.001       # 10 bps per leg
  risk_free_rate: 0.04
  rolling_beta_window: 252
  solver: gurobi                # auto | gurobi | scipy (original study used Gurobi)

backtest:
  initial_capital: 10000
