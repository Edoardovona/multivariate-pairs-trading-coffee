# Default configuration for the multivariate pair trading pipeline.
#
# The reported results were produced with a Bloomberg dataset (see
# data/README.md). This file points to the Yahoo Finance CSV produced by
# scripts/download_data.py so the pipeline is completely reproducible.

data:
  path: data/raw/prices.csv     # or a Bloomberg Excel export (.xlsx)
  start: "2016-02-12"
  end: "2026-02-12"

universe:
  anchor: KC1                   # Arabica front-month future
  sector_proxy: XLP             # consumer staples sector control
  equities: [SJM, KO, MDLZ, JVA]  # fixed basket (used when reselect_basket: false)
  n_pairs: 4                      # basket size when re-selecting per fold
  # Assets excluded from screening: proxies and late-listed equities
  exclude: [DF1, COFF, DBA, MOO, XLP, PBJ, DBC,
            WEST, BROS, BRCC, JDEP, LKNCY, REBN, THCH, KDP]

walk_forward:
  calibration_years: 4          # rolling (fixed-length) calibration window
  test_months: 12               # length of each out-of-sample fold
  reselect_basket: true         # re-run ADF + Engle-Granger screen per fold
  embargo_days: 21              # gap between calibration end and test start

signals:
  zscore_window: 22             # ~1 trading month

strategy:
  risk_aversion: 1.0            # lambda in the bi-objective optimization
  # Aggressiveness sweep: lower lambda -> larger positions (size dial,
  # not signal timing). The pipeline runs the walk-forward once per value.
  risk_aversion_sweep: [0.25, 1.0, 5.0]
  transaction_cost: 0.001       # 10 bps per leg
  risk_free_rate: 0.04
  rolling_beta_window: 252
  solver: auto                  # auto | gurobi | scipy

backtest:
  initial_capital: 10000
